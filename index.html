<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whack-A-Freddie: Arcade Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Roboto+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Bungee', cursive;
        }
        #game-container {
            width: 100%;
            height: 100%;
            max-width: 100vw;
            max-height: 100vh;
            box-shadow: 0 0 100px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>
    <div id="game-container"></div>
    <script>
        const CONFIG = {
            width: 1080,
            height: 1920,
            gridSize: 3,
            holeRadius: 140,
            spawnIntervalMin: 500,
            spawnIntervalMax: 1000,
            displayDuration: 750,
            gameDuration: 60
        };

        const DEPTH = {
            BG_BASE: -20,
            BG_NEBULA: -15,
            BG_STARS: -12,
            BG_PLANETS: -11,
            VIGNETTE: -9,
            GRID_SHADOW: -8,
            HOLES: -7,
            SPOTLIGHT: -6,
            NEPHEW: 0,
            UI: 10
        };

        // --- VISUAL UTILITY HELPERS ---
        function createSpaceBackground(scene) {
            const { width, height } = scene.cameras.main;

            // 1. Base Gradient
            const bg = scene.add.graphics();
            bg.fillGradientStyle(0x050508, 0x050508, 0x1a1a2e, 0x16213e, 1);
            bg.fillRect(0, 0, width, height);
            bg.setDepth(DEPTH.BG_BASE).setScrollFactor(0);

            // 2. Nebula Haze (Subtle blobs)
            const colors = [0x4834d4, 0x686de0, 0xbe2edd];
            for(let i=0; i<5; i++) {
                const haze = scene.add.graphics();
                haze.fillStyle(Phaser.Utils.Array.GetRandom(colors), 0.04);
                haze.fillCircle(Phaser.Math.Between(0, width), Phaser.Math.Between(0, height), Phaser.Math.Between(300, 600));
                haze.setDepth(DEPTH.BG_NEBULA);
            }

            // 3. Stars (Mixed sizes)
            for (let i = 0; i < 150; i++) {
                const x = Phaser.Math.Between(0, width);
                const y = Phaser.Math.Between(0, height);
                const size = Phaser.Math.FloatBetween(1, 3);
                const star = scene.add.circle(x, y, size, 0xffffff, Phaser.Math.FloatBetween(0.2, 0.8));
                star.setDepth(DEPTH.BG_STARS);
                if(Math.random() > 0.9) {
                    scene.tweens.add({ targets: star, alpha: 0.1, duration: Phaser.Math.Between(1000, 3000), yoyo: true, repeat: -1 });
                }
            }

            // 4. Cartoon Planets
            const p1 = scene.add.graphics();
            p1.fillStyle(0xff7979, 1);
            p1.fillCircle(200, 400, 60);
            p1.fillStyle(0x000000, 0.2); // Shadow
            p1.fillCircle(180, 420, 40);
            p1.setDepth(DEPTH.BG_PLANETS);
            
            const p2 = scene.add.graphics();
            p2.fillStyle(0x4834d4, 1);
            p2.fillCircle(width - 150, 800, 40);
            p2.setDepth(DEPTH.BG_PLANETS);

            // 5. Shooting Star Logic
            scene.time.addEvent({
                delay: 7000,
                callback: () => {
                    const startX = Phaser.Math.Between(0, width);
                    const startY = Phaser.Math.Between(0, height/2);
                    const sStar = scene.add.circle(startX, startY, 2, 0xffffff);
                    scene.tweens.add({
                        targets: sStar,
                        x: startX + 400,
                        y: startY + 200,
                        alpha: 0,
                        duration: 800,
                        onComplete: () => sStar.destroy()
                    });
                },
                loop: true
            });
        }

        function createPremiumButton(scene, x, y, label, callback) {
            const container = scene.add.container(x, y);
            
            // Shadow / Underside
            const shadow = scene.add.roundedRect(4, 8, 600, 160, 30, 0x006266);
            
            // Main Body
            const body = scene.add.graphics();
            body.fillStyle(0x00d2d3, 1);
            body.fillRoundedRect(-300, -80, 600, 160, 30);
            body.lineStyle(4, 0xffffff, 0.3);
            body.strokeRoundedRect(-300, -80, 600, 160, 30);
            
            // Gloss Highlight Strip
            const gloss = scene.add.graphics();
            gloss.fillStyle(0xffffff, 0.2);
            gloss.fillRoundedRect(-280, -70, 560, 40, 20);

            const text = scene.add.text(0, 0, label, { 
                fontFamily: 'Bungee', fontSize: '60px', fill: '#000' 
            }).setOrigin(0.5);

            // Sparkle
            const sparkle = scene.add.star(-250, -40, 5, 5, 12, 0xffffff).setAlpha(0.8);
            scene.tweens.add({ targets: sparkle, angle: 180, scale: 1.5, alpha: 0.2, duration: 2000, repeat: -1, yoyo: true });

            container.add([shadow, body, gloss, text, sparkle]);

            const hitArea = scene.add.rectangle(0, 0, 600, 160).setInteractive({ useHandCursor: true });
            hitArea.on('pointerdown', () => {
                scene.tweens.add({
                    targets: container,
                    scale: 0.95,
                    y: y + 5,
                    duration: 50,
                    yoyo: true,
                    onComplete: callback
                });
            });

            return container;
        }

        // --- SCENES ---

        class TitleScene extends Phaser.Scene {
            constructor() { super('TitleScene'); }

            preload() {
                const dotSize = 4;
                const spacing = 64;
                const canvas = this.textures.createCanvas('pattern', spacing, spacing);
                const ctx = canvas.getContext();
                ctx.fillStyle = 'rgba(255, 255, 255, 0.05)';
                ctx.beginPath();
                ctx.arc(spacing / 2, spacing / 2, dotSize / 2, 0, Math.PI * 2);
                ctx.fill();
                canvas.refresh();
            }

            create() {
                const { width, height } = this.cameras.main;

                createSpaceBackground(this);

                // Branded Logo
                const logoContainer = this.add.container(width / 2, height * 0.35);
                
                // Cyan Glow
                const glow = this.add.text(0, 0, 'WHACK-A\nFREDDIE', {
                    fontFamily: 'Bungee', fontSize: '140px', fill: '#00ffff', align: 'center'
                }).setOrigin(0.5).setAlpha(0.3);
                
                // Main Text
                const title = this.add.text(0, 0, 'WHACK-A\nFREDDIE', {
                    fontFamily: 'Bungee',
                    fontSize: '140px',
                    fill: '#ffffff',
                    stroke: '#000',
                    strokeThickness: 18,
                    align: 'center'
                }).setOrigin(0.5);

                // Inner Shading simulation (Duplicate text slightly offset)
                const shade = this.add.text(0, 5, 'WHACK-A\nFREDDIE', {
                    fontFamily: 'Bungee', fontSize: '140px', fill: '#d1d1d1', align: 'center'
                }).setOrigin(0.5).setDepth(-1);
                
                const titleSparkle = this.add.star(240, -100, 5, 8, 20, 0xffffff);
                this.tweens.add({ targets: titleSparkle, alpha: 0.2, scale: 0.5, duration: 1000, yoyo: true, repeat: -1 });

                logoContainer.add([glow, shade, title, titleSparkle]);

                createPremiumButton(this, width / 2, height * 0.65, 'START GAME', () => {
                    this.scene.start('MainScene');
                });

                this.tweens.add({ targets: logoContainer, y: logoContainer.y + 20, duration: 2500, yoyo: true, repeat: -1, ease: 'Sine.easeInOut' });
            }
        }

        class MainScene extends Phaser.Scene {
            constructor() { super('MainScene'); }

            preload() {
                this.load.image('calm', 'calm.png');
                this.load.image('shocked', 'shocked.png');
                this.load.image('annoyed', 'annoyed.png');
                this.load.image('sleeping', 'sleeping.png');
            }

            init() {
                this.score = 0;
                this.timeLeft = CONFIG.gameDuration;
                this.combo = 0;
                this.multiplier = 1;
                this.holes = [];
                this.activeNephew = null;
                this.activeSpotlight = null;
                this.isGameOver = false;
            }

            create() {
                const { width, height } = this.cameras.main;

                createSpaceBackground(this);

                const pattern = this.add.tileSprite(0, 0, width, height, 'pattern');
                pattern.setOrigin(0, 0).setAlpha(0.3).setDepth(DEPTH.BACKGROUND + 1);

                this.createVignette();
                this.createUI();
                this.createGrid();
                this.showIntro();
            }

            createVignette() {
                const { width, height } = this.cameras.main;
                const vignette = this.add.graphics();
                vignette.fillStyle(0x000000, 1);
                vignette.fillRect(0, 0, width, height);
                vignette.setAlpha(0.3);
                vignette.setBlendMode(Phaser.BlendModes.MULTIPLY);
                vignette.setDepth(DEPTH.VIGNETTE);
            }

            showIntro() {
                const { width, height } = this.cameras.main;
                const readyText = this.add.text(width / 2, height / 2, 'READY?', { 
                    fontSize: '200px', fill: '#ffff00', stroke: '#000', strokeThickness: 20 
                }).setOrigin(0.5).setScale(0);

                this.tweens.add({
                    targets: readyText, scale: 1, duration: 500, ease: 'Back.easeOut',
                    onComplete: () => {
                        this.time.delayedCall(500, () => {
                            readyText.setText('GO!').setFill('#00ff00');
                            this.tweens.add({
                                targets: readyText, scale: 2, alpha: 0, duration: 500,
                                onComplete: () => { readyText.destroy(); this.startGame(); }
                            });
                        });
                    }
                });
            }

            startGame() {
                this.time.addEvent({ delay: 1000, callback: this.updateTimer, callbackScope: this, loop: true });
                this.scheduleNextSpawn();
                this.input.on('pointerdown', (pointer, currentlyOver) => {
                    if (currentlyOver.length === 0) this.handleMiss(pointer.x, pointer.y);
                });
            }

            createUI() {
                const { width } = this.cameras.main;
                
                this.titleText = this.add.text(width / 2, 350, 'WHACK-A-FREDDIE', { 
                    fontFamily: 'Bungee', fontSize: '110px', fill: '#ffffff', stroke: '#000', strokeThickness: 12
                }).setOrigin(0.5);
                
                this.scoreText = this.add.text(width / 2, 530, '00000', { 
                    fontFamily: 'Roboto Mono', fontSize: '140px', fill: '#00ffcc', stroke: '#000', strokeThickness: 10
                }).setOrigin(0.5);
                
                this.add.text(width / 2, 440, 'SCORE', { fontSize: '40px', fill: '#ffffff' }).setOrigin(0.5);

                this.timerText = this.add.text(width / 2, 670, '60', { 
                    fontSize: '100px', fill: '#ff0055', stroke: '#000', strokeThickness: 5
                }).setOrigin(0.5);

                this.comboContainer = this.add.container(width / 2, 800);
                this.comboText = this.add.text(0, 0, 'COMBO: 0', { fontSize: '60px', fill: '#ffcc00' }).setOrigin(0.5);
                this.multiplierText = this.add.text(0, 80, 'x1', { fontSize: '80px', fill: '#00ff00', fontWeight: 'bold' }).setOrigin(0.5);
                this.comboContainer.add([this.comboText, this.multiplierText]);
                this.comboContainer.setAlpha(0);
                
                [this.titleText, this.scoreText, this.timerText, this.comboContainer].forEach(el => el.setDepth(DEPTH.UI));
            }

            createGrid() {
                const { width, height } = this.cameras.main;
                const startX = width / 2 - 320;
                const startY = height / 2 + 100;
                const spacing = 320;

                for (let row = 0; row < CONFIG.gridSize; row++) {
                    for (let col = 0; col < CONFIG.gridSize; col++) {
                        const x = startX + col * spacing;
                        const y = startY + row * spacing;
                        this.add.ellipse(x, y + 15, CONFIG.holeRadius * 2.1, CONFIG.holeRadius * 1.3, 0x000000, 0.4).setDepth(DEPTH.HOLES - 1);
                        const hole = this.add.graphics();
                        hole.fillStyle(0x0a0a0a, 1);
                        hole.fillEllipse(x, y, CONFIG.holeRadius * 2, CONFIG.holeRadius * 1.2);
                        hole.lineStyle(4, 0x666666, 0.8);
                        hole.strokeEllipse(x, y, CONFIG.holeRadius * 2, CONFIG.holeRadius * 1.2);
                        hole.setDepth(DEPTH.HOLES);
                        const hitArea = this.add.ellipse(x, y, CONFIG.holeRadius * 2, CONFIG.holeRadius * 1.2).setInteractive();
                        hitArea.on('pointerdown', () => this.handleMiss(x, y));
                        this.holes.push({ x, y, hitArea });
                    }
                }
            }

            updateTimer() {
                if (this.isGameOver) return;
                this.timeLeft--;
                this.timerText.setText(this.timeLeft.toString().padStart(2, '0'));
                if (this.timeLeft <= 10) {
                    this.timerText.setFill('#ff0000');
                    this.tweens.add({ targets: this.timerText, scale: 1.2, duration: 200, yoyo: true });
                }
                if (this.timeLeft <= 0) this.endGame();
            }

            scheduleNextSpawn() {
                if (this.isGameOver) return;
                const delay = Phaser.Math.Between(CONFIG.spawnIntervalMin, CONFIG.spawnIntervalMax);
                this.time.delayedCall(delay, this.spawnNephew, [], this);
            }

            spawnNephew() {
                if (this.isGameOver) return;
                if (this.activeNephew) this.activeNephew.destroy();
                if (this.activeSpotlight) this.activeSpotlight.destroy();

                const hole = Phaser.Utils.Array.GetRandom(this.holes);
                const typeRoll = Math.random();
                let type = typeRoll < 0.15 ? 'decoy' : 'normal';

                const spotlight = this.add.graphics();
                spotlight.fillStyle(0x00ffcc, 0.1);
                spotlight.fillCircle(hole.x, hole.y, CONFIG.holeRadius * 1.5);
                spotlight.setDepth(DEPTH.SPOTLIGHT);
                this.activeSpotlight = spotlight;

                const nephew = this.createNephewGraphic(hole.x, hole.y, type);
                nephew.type = type;
                nephew.setDepth(DEPTH.NEPHEW).setInteractive(new Phaser.Geom.Circle(0, 0, 100), Phaser.Geom.Circle.Contains);
                nephew.on('pointerdown', (p, lx, ly, event) => { event.stopPropagation(); this.handleHit(nephew, spotlight); });

                this.activeNephew = nephew;

                this.time.delayedCall(CONFIG.displayDuration, () => {
                    if (this.activeNephew === nephew) {
                        this.tweens.add({
                            targets: [nephew, spotlight], alpha: 0, duration: 100,
                            onComplete: () => {
                                nephew.destroy(); spotlight.destroy();
                                if (type !== 'decoy') { this.score = Math.max(0, this.score - 1); this.resetCombo(); this.updateUI(); }
                                this.scheduleNextSpawn();
                            }
                        });
                    }
                });
            }

            createNephewGraphic(x, y, type) {
                const container = this.add.container(x, y + 50);
                let textureKey = type === 'decoy' ? 'sleeping' : (this.combo >= 6 ? 'annoyed' : (this.combo >= 3 ? 'shocked' : 'calm'));
                const img = this.add.image(0, 0, textureKey).setDisplaySize(220, 220);
                container.add(img);
                this.tweens.add({ targets: container, y: y - 80, duration: 150, ease: 'Back.easeOut' });
                return container;
            }

            handleHit(nephew, spotlight) {
                if (this.isGameOver) return;
                const { x, y, type } = nephew;
                nephew.destroy();
                if (spotlight) spotlight.destroy();
                this.cameras.main.shake(100, 0.01);

                if (type === 'decoy') {
                    this.score = Math.max(0, this.score - 1);
                    this.resetCombo();
                    this.showFloatingText(x, y, 'BAD! -1', '#ff0000');
                } else {
                    this.combo++;
                    this.updateMultiplier();
                    this.score += (1 * this.multiplier);
                    this.showFloatingText(x, y, `+${1 * this.multiplier}`, '#00ffcc');
                    if (this.combo >= 3) {
                        this.comboContainer.setAlpha(1);
                        this.tweens.add({ targets: this.comboContainer, scale: 1.2, duration: 100, yoyo: true });
                    }
                }
                this.updateUI();
                this.scheduleNextSpawn();
            }

            handleMiss(x, y) {
                if (this.isGameOver) return;
                this.score = Math.max(0, this.score - 1);
                this.resetCombo();
                this.updateUI();
                this.showFloatingText(x, y, 'MISS -1', '#888888');
                this.cameras.main.flash(50, 100, 0, 0, 0.2);
            }

            resetCombo() {
                if (this.combo > 0) this.tweens.add({ targets: this.comboContainer, alpha: 0, duration: 200 });
                this.combo = 0; this.multiplier = 1; this.updateUI();
            }

            updateMultiplier() {
                this.multiplier = this.combo >= 6 ? 3 : (this.combo >= 3 ? 2 : 1);
            }

            updateUI() {
                this.scoreText.setText(this.score.toString().padStart(5, '0'));
                this.comboText.setText(`COMBO: ${this.combo}`);
                this.multiplierText.setText(`x${this.multiplier}`);
                if (this.multiplier > 1) this.multiplierText.setFill(this.multiplier >= 3 ? '#ff00ff' : '#00ff00');
            }

            showFloatingText(x, y, text, color) {
                const txt = this.add.text(x, y, text, { fontSize: '80px', fill: color, fontWeight: 'bold', stroke: '#000', strokeThickness: 5 }).setOrigin(0.5);
                this.tweens.add({ targets: txt, y: y - 200, alpha: 0, duration: 600, onComplete: () => txt.destroy() });
            }

            endGame() {
                this.isGameOver = true;
                const high = parseInt(localStorage.getItem('freddie_high_score_arcade') || '0');
                if (this.score > high) localStorage.setItem('freddie_high_score_arcade', this.score.toString());
                this.scene.start('GameOverScene', { score: this.score, highScore: Math.max(this.score, high) });
            }
        }

        class GameOverScene extends Phaser.Scene {
            constructor() { super('GameOverScene'); }
            create(data) {
                const { width, height } = this.cameras.main;
                createSpaceBackground(this);
                this.add.rectangle(width/2, height/2, width, height, 0x000000, 0.7);

                this.add.text(width / 2, height / 2 - 400, 'GAME OVER', { fontSize: '140px', fill: '#ff0055', stroke: '#fff', strokeThickness: 10 }).setOrigin(0.5);
                this.add.text(width / 2, height / 2 - 50, `${data.score}`, { fontSize: '120px', fill: '#00ffcc' }).setOrigin(0.5);
                this.add.text(width / 2, height / 2 + 100, `BEST: ${data.highScore}`, { fontSize: '60px', fill: '#ffcc00' }).setOrigin(0.5);

                createPremiumButton(this, width / 2, height / 2 + 350, 'PLAY AGAIN', () => {
                    this.scene.start('MainScene');
                });
            }
        }

        const config = {
            type: Phaser.AUTO,
            parent: 'game-container',
            width: CONFIG.width,
            height: CONFIG.height,
            scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
            scene: [TitleScene, MainScene, GameOverScene],
            backgroundColor: '#050505'
        };

        new Phaser.Game(config);
    </script>
</body>
</html>
