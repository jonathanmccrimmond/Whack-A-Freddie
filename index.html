<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whack-A-Billy: Arcade Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Roboto+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Bungee', cursive;
        }
        #game-container {
            width: 100%;
            height: 100%;
            max-width: 100vw;
            max-height: 100vh;
            box-shadow: 0 0 100px rgba(0,255,204,0.2);
        }
    </style>
</head>
<body>
    <div id="game-container"></div>

    <script>
        /** 
         * GAME CONFIGURATION 
         * Adjust these values to balance the gameplay
         */
        const CONFIG = {
            width: 1080,
            height: 1920,
            gridSize: 3,
            holeRadius: 135,
            gameDuration: 60,
            spawnRates: {
                start: 1100, // ms between spawns at start
                end: 450     // ms between spawns at 0 seconds
            },
            displayTime: {
                start: 900,  // how long Billy stays up at start
                end: 500     // how long Billy stays up at 0 seconds
            }
        };

        // Helper to generate shapes if images are missing
        function createPlaceholderAssets(scene) {
            const generateFace = (key, color, eyeType) => {
                const graphics = scene.make.graphics({ x: 0, y: 0, add: false });
                graphics.fillStyle(color, 1);
                graphics.fillCircle(100, 100, 90);
                graphics.lineStyle(8, 0xffffff, 1);
                graphics.strokeCircle(100, 100, 90);
                graphics.fillStyle(0xffffff, 1);
                if(eyeType === 'closed') {
                    graphics.lineStyle(6, 0xffffff);
                    graphics.lineBetween(60, 80, 85, 80);
                    graphics.lineBetween(115, 80, 140, 80);
                } else {
                    graphics.fillCircle(70, 80, 15);
                    graphics.fillCircle(130, 80, 15);
                }
                graphics.generateTexture(key, 200, 200);
            };

            if (!scene.textures.exists('calm')) generateFace('calm', 0x00ccff, 'open');
            if (!scene.textures.exists('shocked')) generateFace('shocked', 0x00ffcc, 'open');
            if (!scene.textures.exists('annoyed')) generateFace('annoyed', 0xffaa00, 'open');
            if (!scene.textures.exists('sleeping')) generateFace('sleeping', 0x555555, 'closed');
        }

        class BootScene extends Phaser.Scene {
            constructor() { super('BootScene'); }
            preload() {
                // Preload your images here
                this.load.image('calm', 'calm.png');
                this.load.image('shocked', 'shocked.png');
                this.load.image('annoyed', 'annoyed.png');
                this.load.image('sleeping', 'sleeping.png');
            }
            create() {
                createPlaceholderAssets(this);
                this.scene.start('TitleScene');
            }
        }

        class TitleScene extends Phaser.Scene {
            constructor() { super('TitleScene'); }
            create() {
                const { width, height } = this.cameras.main;
                this.add.rectangle(0, 0, width, height, 0x0f0c29).setOrigin(0);

                const title = this.add.text(width / 2, height / 3, 'WHACK-A-BILLY\nARCADE', {
                    fontSize: '120px', fill: '#00ffcc', align: 'center', stroke: '#000', strokeThickness: 15
                }).setOrigin(0.5);

                const startBtn = this.add.container(width / 2, height / 1.5);
                const bg = this.add.rectangle(0, 0, 600, 160, 0xff0055).setInteractive({ useHandCursor: true });
                const txt = this.add.text(0, 0, 'PLAY NOW', { fontSize: '70px', fill: '#fff' }).setOrigin(0.5);
                startBtn.add([bg, txt]);

                bg.on('pointerdown', () => {
                    this.tweens.add({
                        targets: startBtn, scale: 0.9, duration: 100, yoyo: true,
                        onComplete: () => this.scene.start('MainScene')
                    });
                });

                this.tweens.add({
                    targets: title, y: title.y + 40, duration: 2000, yoyo: true, repeat: -1, ease: 'Sine.easeInOut'
                });
            }
        }

        class MainScene extends Phaser.Scene {
            constructor() { super('MainScene'); }

            init() {
                this.score = 0;
                this.timeLeft = CONFIG.gameDuration;
                this.combo = 0;
                this.multiplier = 1;
                this.isGameOver = false;
                this.holes = [];
            }

            create() {
                const { width, height } = this.cameras.main;

                // UI & Background
                this.add.rectangle(0, 0, width, height, 0x0a0a0a).setOrigin(0);
                this.scoreText = this.add.text(width / 2, 180, '0000', { 
                    fontFamily: 'Roboto Mono', fontSize: '200px', fill: '#00ffcc' 
                }).setOrigin(0.5);
                
                this.timerText = this.add.text(width / 2, 320, CONFIG.gameDuration + 's', { 
                    fontSize: '90px', fill: '#ff0055' 
                }).setOrigin(0.5);

                this.comboText = this.add.text(width / 2, 430, '', { 
                    fontSize: '60px', fill: '#ffcc00' 
                }).setOrigin(0.5);

                // Create 3x3 Grid
                const spacing = 320;
                const startY = height / 2 + 150;
                for (let i = 0; i < 9; i++) {
                    const col = i % 3;
                    const row = Math.floor(i / 3);
                    const x = (width / 2 - spacing) + (col * spacing);
                    const y = startY + (row * spacing);

                    // Hole Shadow/Base
                    this.add.ellipse(x, y, CONFIG.holeRadius * 2.1, CONFIG.holeRadius * 1.2, 0x000000, 0.5);
                    const holeGraphics = this.add.graphics();
                    holeGraphics.fillStyle(0x111111, 1);
                    holeGraphics.fillEllipse(x, y, CONFIG.holeRadius * 2, CONFIG.holeRadius * 1.2);
                    holeGraphics.lineStyle(4, 0x333333, 1);
                    holeGraphics.strokeEllipse(x, y, CONFIG.holeRadius * 2, CONFIG.holeRadius * 1.2);

                    this.holes.push({ x, y, active: false });
                }

                // Game Loops
                this.scheduleNextSpawn();
                this.time.addEvent({ delay: 1000, callback: this.tick, callbackScope: this, loop: true });
            }

            tick() {
                if (this.isGameOver) return;
                this.timeLeft--;
                this.timerText.setText(this.timeLeft + 's');
                if (this.timeLeft <= 10) this.timerText.setFill('#ff0000');
                if (this.timeLeft <= 0) this.endGame();
            }

            getDifficulty() {
                // Returns 0.0 at start, 1.0 at end of game
                return 1 - (this.timeLeft / CONFIG.gameDuration);
            }

            scheduleNextSpawn() {
                if (this.isGameOver) return;
                const diff = this.getDifficulty();
                const delay = Phaser.Math.Linear(CONFIG.spawnRates.start, CONFIG.spawnRates.end, diff);
                this.time.delayedCall(delay, () => {
                    this.spawnBilly();
                    this.scheduleNextSpawn();
                });
            }

            spawnBilly() {
                const openHoles = this.holes.filter(h => !h.active);
                if (openHoles.length === 0) return;

                const hole = Phaser.Utils.Array.GetRandom(openHoles);
                hole.active = true;

                const isDecoy = Math.random() < 0.2;
                const texture = isDecoy ? 'sleeping' : (this.combo > 5 ? 'annoyed' : 'calm');
                
                const billy = this.add.image(hole.x, hole.y + 120, texture);
                billy.setInteractive().setScale(0.2).setDepth(10);

                // Entrance
                this.tweens.add({
                    targets: billy, y: hole.y - 70, scale: 1.1, duration: 250, ease: 'Back.easeOut'
                });

                // Auto-Hide logic
                const diff = this.getDifficulty();
                const upTime = Phaser.Math.Linear(CONFIG.displayTime.start, CONFIG.displayTime.end, diff);

                const hideEvent = this.time.delayedCall(upTime, () => {
                    if (billy.active) {
                        this.tweens.add({
                            targets: billy, y: hole.y + 120, scale: 0.2, duration: 200,
                            onComplete: () => {
                                if (!isDecoy) this.resetCombo();
                                billy.destroy();
                                hole.active = false;
                            }
                        });
                    }
                });

                billy.on('pointerdown', () => {
                    hideEvent.remove();
                    this.handleHit(billy, hole, isDecoy);
                });
            }

            handleHit(billy, hole, isDecoy) {
                const { x, y } = billy;
                hole.active = false;

                if (isDecoy) {
                    this.score = Math.max(0, this.score - 5);
                    this.resetCombo();
                    this.cameras.main.flash(200, 100, 0, 0, 0.3);
                    this.showFloatingText(x, y, "-5", "#ff0000");
                } else {
                    this.combo++;
                    this.multiplier = this.combo > 10 ? 3 : (this.combo > 5 ? 2 : 1);
                    const points = 10 * this.multiplier;
                    this.score += points;
                    
                    this.cameras.main.shake(100, 0.01);
                    this.showFloatingText(x, y, `+${points}`, "#00ffcc");
                    this.updateComboUI();
                }

                this.scoreText.setText(this.score.toString().padStart(4, '0'));
                this.createExplosion(x, y, isDecoy ? 0xff0000 : 0x00ffcc);
                billy.destroy();
            }

            updateComboUI() {
                if (this.combo >= 3) {
                    this.comboText.setText(`${this.combo} STREAK! (x${this.multiplier})`);
                    this.comboText.setScale(1.4);
                    this.tweens.add({ targets: this.comboText, scale: 1, duration: 200 });
                }
            }

            resetCombo() {
                this.combo = 0;
                this.multiplier = 1;
                this.comboText.setText("");
            }

            showFloatingText(x, y, content, color) {
                const txt = this.add.text(x, y, content, { 
                    fontSize: '100px', fill: color, stroke: '#000', strokeThickness: 10 
                }).setOrigin(0.5);
                this.tweens.add({
                    targets: txt, y: y - 180, alpha: 0, duration: 700, onComplete: () => txt.destroy()
                });
            }

            createExplosion(x, y, color) {
                for (let i = 0; i < 10; i++) {
                    const part = this.add.circle(x, y, 12, color);
                    const angle = Math.random() * Math.PI * 2;
                    const speed = Math.random() * 250;
                    this.tweens.add({
                        targets: part,
                        x: x + Math.cos(angle) * speed,
                        y: y + Math.sin(angle) * speed,
                        alpha: 0,
                        scale: 0,
                        duration: 500,
                        onComplete: () => part.destroy()
                    });
                }
            }

            endGame() {
                this.isGameOver = true;
                const high = localStorage.getItem('billy_high') || 0;
                if (this.score > high) localStorage.setItem('billy_high', this.score);
                this.scene.start('GameOverScene', { score: this.score, high: Math.max(this.score, high) });
            }
        }

        class GameOverScene extends Phaser.Scene {
            constructor() { super('GameOverScene'); }
            create(data) {
                const { width, height } = this.cameras.main;
                this.add.rectangle(0, 0, width, height, 0x000000, 0.85).setOrigin(0);

                this.add.text(width / 2, height / 3, 'GAME OVER', { fontSize: '140px', fill: '#ff0055' }).setOrigin(0.5);
                this.add.text(width / 2, height / 2 - 50, `SCORE: ${data.score}`, { fontSize: '100px', fill: '#00ffcc' }).setOrigin(0.5);
                this.add.text(width / 2, height / 2 + 80, `BEST: ${data.high}`, { fontSize: '60px', fill: '#ffcc00' }).setOrigin(0.5);

                const btn = this.add.rectangle(width / 2, height / 1.5 + 100, 500, 140, 0x00ffcc).setInteractive();
                this.add.text(width / 2, height / 1.5 + 100, 'RETRY', { fontSize: '70px', fill: '#000' }).setOrigin(0.5);

                btn.on('pointerdown', () => this.scene.start('MainScene'));
            }
        }

        const config = {
            type: Phaser.AUTO,
            parent: 'game-container',
            width: CONFIG.width,
            height: CONFIG.height,
            scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
            scene: [BootScene, TitleScene, MainScene, GameOverScene],
            backgroundColor: '#050505'
        };

        new Phaser.Game(config);
    </script>
</body>
</html>
